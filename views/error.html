<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Erro - Mitsuri</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:url('https://i.postimg.cc/DZBZgy1f/b72a5dc0dba417c71f8e6a135c2dd001.jpg') no-repeat center center fixed;
  background-size:cover;
  color:#fff;
}

/* overlay */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(135deg, rgba(255,105,180,0.3), rgba(144,238,144,0.2));
  backdrop-filter:blur(8px);
  z-index:-1;
}

/* card */
.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  border-radius:20px;
  padding:25px;
  box-shadow:0 0 25px rgba(0,0,0,0.5);
  text-align:center;
  max-width:350px;
}

/* imagem */
.card img{
  width:120px;
  margin-bottom:15px;
  filter:drop-shadow(0 0 10px #ff4d88);
}

/* título erro */
h1{
  font-size:22px;
  margin-bottom:10px;
  color:#ff9ed6;
}

/* texto */
p{
  font-size:14px;
  opacity:0.8;
  margin-bottom:15px;
}

/* botão */
.btn{
  padding:12px;
  border:none;
  border-radius:10px;
  width:100%;
  background:linear-gradient(45deg,#ff9ed6,#90ee90);
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
  <img src="https://i.postimg.cc/QtLVtyht/ef984fd8e2ab3148a1470c4fa3586475.jpg">

  <h1>Oops... ocorreu um erro</h1>
  <p>Algo deu errado ao carregar essa página.</p>

  <button class="btn" onclick="window.location.href='/'">
    Voltar para Home
  </button>
</div>

</body>
</html>
